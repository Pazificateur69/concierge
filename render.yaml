# Render Blueprint — déploie les 6 services backend
# https://render.com/docs/blueprint-spec
# Build filters : un service ne se redéploie que si son code OU les packages partagés changent.

envVarGroups:
  - name: concierge-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: MONGO_URI
        value: mongodb+srv://alessandronetstrategy_db_user:FPbaVlM9BJzq6PNj@cluster0.dhduoky.mongodb.net/concierge?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

services:
  # ───────── API Gateway ─────────
  - type: web
    name: concierge-gateway
    runtime: node
    region: frankfurt
    plan: free
    buildFilter:
      paths:
        - apps/api-gateway/**
        - packages/types/**
        - packages/nest-common/**
        - render.yaml
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
    buildCommand: npm install -g pnpm@9.10.0 --force && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types build && pnpm --filter @concierge/nest-common build && pnpm --filter api-gateway build
    startCommand: cd apps/api-gateway && node dist/main.js
    healthCheckPath: /healthz
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000
      - key: SERVICE_AUTH_URL
        fromService: { type: web, name: concierge-auth, property: hostport }
      - key: SERVICE_TENANT_URL
        fromService: { type: web, name: concierge-tenant, property: hostport }
      - key: SERVICE_CONTENT_URL
        fromService: { type: web, name: concierge-content, property: hostport }
      - key: SERVICE_ORDERS_URL
        fromService: { type: web, name: concierge-orders, property: hostport }
      - key: SERVICE_SURVEY_URL
        fromService: { type: web, name: concierge-survey, property: hostport }

  # ───────── auth-service ─────────
