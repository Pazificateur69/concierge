# Infrastructure as Code pour Render — déploie tous les microservices + gateway
# Blueprint spec : https://render.com/docs/blueprint-spec
#
# Usage : Render dashboard → New + → Blueprint → connecte le repo concierge
# Tout se déploie en 1 clic.

envVarGroups:
  - name: concierge-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://alessandronetstrategy_db_user:FPbaVlM9BJzq6PNj@cluster0.dhduoky.mongodb.net/concierge?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

services:
  # ───────── API Gateway (entrée publique) ─────────
  - type: web
    name: concierge-gateway
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api-gateway
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter api-gateway build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000
      - key: SERVICE_AUTH_URL
        fromService: { type: web, name: concierge-auth, property: hostport }
      - key: SERVICE_TENANT_URL
        fromService: { type: web, name: concierge-tenant, property: hostport }
      - key: SERVICE_CONTENT_URL
        fromService: { type: web, name: concierge-content, property: hostport }
      - key: SERVICE_ORDERS_URL
        fromService: { type: web, name: concierge-orders, property: hostport }
      - key: SERVICE_SURVEY_URL
        fromService: { type: web, name: concierge-survey, property: hostport }

  # ───────── auth-service ─────────
  - type: web
    name: concierge-auth
    runtime: node
    region: frankfurt
    plan: free
    rootDir: services/auth-service
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter auth-service build
    startCommand: node dist/main.js
    healthCheckPath: /auth/health
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000

  # ───────── tenant-service ─────────
  - type: web
    name: concierge-tenant
    runtime: node
    region: frankfurt
    plan: free
    rootDir: services/tenant-service
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter tenant-service build
    startCommand: node dist/main.js
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000

  # ───────── content-service ─────────
  - type: web
    name: concierge-content
    runtime: node
    region: frankfurt
    plan: free
    rootDir: services/content-service
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter content-service build
    startCommand: node dist/main.js
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000

  # ───────── orders-service (avec WebSocket) ─────────
  - type: web
    name: concierge-orders
    runtime: node
    region: frankfurt
    plan: free
    rootDir: services/orders-service
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter orders-service build
    startCommand: node dist/main.js
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000

  # ───────── survey-service ─────────
  - type: web
    name: concierge-survey
    runtime: node
    region: frankfurt
    plan: free
    rootDir: services/survey-service
    buildCommand: corepack enable && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @concierge/types --filter @concierge/nest-common --filter survey-service build
    startCommand: node dist/main.js
    envVars:
      - fromGroup: concierge-shared
      - key: PORT
        value: 10000
