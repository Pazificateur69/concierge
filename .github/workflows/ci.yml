name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r --filter "./services/**" --filter "./apps/api-gateway" run build || echo "build issues"
      - run: pnpm -r --filter "./services/**" run test --if-present
        env:
          MONGO_URI: mongodb://localhost:27017/concierge_test

  build-frontends:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        app: [lobby-kiosk, smiley, admin, reception]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter ${{ matrix.app }} build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, content-service, orders-service, survey-service, tenant-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t concierge-${{ matrix.service }}:${{ github.sha }} \
            .
