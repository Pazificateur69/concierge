version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      nest:
        patterns: ["@nestjs/*"]
      angular:
        patterns: ["@angular/*", "@angular-devkit/*"]
      vue:
        patterns: ["vue", "@vue/*", "@ionic/*", "vue-i18n", "vue-router"]
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint", "eslint-*", "@typescript-eslint/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/auth-service"
    schedule:
      interval: "monthly"
